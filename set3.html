  function toProperties(n)
  {
    let r1 = n % 3;
    let d1 = (n-r1)/3
    
    let r2 = d1 % 3;
    let d2 = (d1-r2)/3;

    let r3 = d2 % 3;
    let d3 = (d2-r3)/3;

    let res = [r1,r2,r3,d3];
    


    return res;
  }



  function secureShuffle(n)
  {
    const arr = Array.from({ length: n }, (_, i) => i );
    const randomValues = new Uint32Array(n);
    window.crypto.getRandomValues(randomValues);

    for (let i = arr.length - 1; i > 0; i--) {
        // Use the cryptographically strong random value
        const j = randomValues[i] % (i + 1);
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  function findCurrentSets(Cards)
  {
    let currentSets = [];
    let compCardProp;

    for(let i=0; i<Cards.length-2;i++ )
    {
      for(let j=i+1;j<Cards.length-1;j++)
      {
        let compCardProp = complementaryCardProperites(Cards[i],Cards[j]);
        let n1 = propertiesToNumber(compCardProp);

        for(let k=j+1;k<Cards.length;k++)
        {
          let n2 = propertiesToNumber(Cards[k].properties);
          if(n1==n2)
          {
            let newSet = [];
            newSet.push(Cards[i]);
            newSet.push(Cards[j]);
            newSet.push(Cards[k]);
            currentSets.push(newSet);
          }


        }


      }

    }

    return currentSets;

  }

  function complementaryCardProperites(Card1,Card2)
  {
    let res=[];

    let cP1 = Card1.properties;
    let cP2 = Card2.properties;

    for(let i=0;i<4;i++)
    {
      let prop;

      let n1=Number(cP1[i]);
      let n2=Number(cP2[i]);
      if( n1==n2 )
      {
        prop = n1;
      }

      else
      {
        prop = Number(3 - n1 - n2 );
      }

      res.push(prop);

    }

    return res;

  }

  function propertiesToNumber(cardProp)
  {
    let res=0;
    for(let i=0;i<4;i++)
    {
      res+=Number(cardProp[i])*Number(3**i);
    }

    return res;

  }
