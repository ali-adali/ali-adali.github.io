<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnowFlakeGen: Unified Console</title>
  <style>
    :root { --accent: seagreen; --panel-bg: rgba(255, 255, 255, 0.98); }
    * { box-sizing: border-box; }
    body {
      margin: 0; height: 100vh; width: 100vw;
      font-family: 'Inter', sans-serif;
      background: radial-gradient(circle, #2d5a5a, #1a3a3a);
      overflow: hidden; 
      color: white;
      display: flex;
      flex-direction: row;
    }

    /* Left Console Sidebar */
    .console-left {
      width: 60dvmin;
      background: transparent;
      border-right: 0.1vmin solid #444; 
      overflow-y: auto;
      padding: 2vmin; 
      flex-shrink: 0; 
      display: flex; 
      flex-direction: column; 
      gap: 1vmin;
    }

    

    .console-section { border-bottom: 0.1vmin solid #333; padding-bottom: 2vmin; }
    .console-label { font-size: 2.5vmin; font-weight: 900; color: var(--accent); text-transform: uppercase; margin-bottom: 0.5vmin; letter-spacing: -0.1vmin; }

    /* UI Panels */
    .ui-panel {
      position: fixed; background: var(--panel-bg);
      border-radius: 1.5vmin; 
      color: #333;
      box-shadow: 0 1.5vmin 5vmin rgba(0,0,0,0.5);
      z-index: 10; 
      font-size: 2vmin;
    }

    .ui-panel-alt {
      position: absolute;
      bottom:16vmin;
      left:140vmin;
      max-height: 38vmin;
      max-width: 80vmin;
      overflow-y: auto;
      
      background: transparent;
      border-radius: 1.5vmin;
      color: #333;
      box-shadow: 0 0px 0px rgba(0,0,0,0.5);
      z-index: 10; 
      font-size: 2vmin;

      display: none;
    }

    .drag-handle {
      background: #333; 
      height: 6vmin;
      border-radius: 1.5vmin 1.5vmin 0 0;
      font-size: 2.5vmin; 
      font-weight: light; 
      color: snow;
      user-select: none;
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
    }

    .collapsed { display: none !important; }

    .panel-content {
      padding: 0.1vmin; 
      display: flex; 
      flex-direction: column; 
      gap: 1vmin; }

    input[type="number"] { width: auto; padding: 0.1vmin; border: 0.1vmin solid #ccc; border-radius: 0.5vmin; font-size: 2.0vmin; }
    input[type="range"] { width: 100%; margin: 0.3vmin 0; accent-color: var(--accent); }
    
    table { width: 100%; border-collapse: collapse; font-size: 2vmin; }
    th { background: #f0f0f0; padding: 0.2vmin; border: 0.1vmin solid #ddd; }
    td { border: 0.1vmin solid #ddd; padding: 0.2vmin; text-align: center; }

    button { border: none; border-radius: 1vmin; cursor: pointer; font-weight: bold; font-size: 2.5vmin; transition: 0.2s; height: 6vmin; }

    .btn-main
    {
      background: var(--accent);
      color: white;
      width: 90%;
      margin-left: 5%;
    }

    .btn-outline
    { 
      background: var(--accent);
      color: white;
      flex: 1;
    }

    .btn-del 
    { 
      background: #ff4d4d; 
      color: white; 
      border-radius:20%; 
      aspect-ratio:1; 
      height:3.0vmin; 
      font-size:2.5vmin; 
      font-weight:bold;
      display:flex; 
      flex-direction:column; 
      justify-content:center; 
      align-items:center; 
      text-align:center;
    }

    .btn-reset-design
    {
      background: var(--accent);
      color: white;
      width:30vmin;
      height: 10vmin;
      
      left:1vmin;
    }


    .col-input{ height:4.5vmin; width: 4.5vmin; border:none; border-radius: 50%; margin-left: 1vmin; background:none;  }
    
    .history-item { 
      background: #1a1a1a; border: 0.1vmin solid #444; padding: 1vmin; 
      border-radius: 0.7vmin; margin-bottom: 0.6vmin; cursor: pointer; font-size: 2vmin; 
    }
    .history-item:hover { border-color: var(--accent); background: #222; }

    #mainSVG 
    { 
      display: block;
      
      left:1vmin; 
      display: block; 
      margin-left: 0vmin; 
      height: 100vmin; 
      width: 100vmin; 
      filter: drop-shadow(0 0 20px rgba(0,0,0,0.5)); 
      scale:0.98; 
      border-radius:6vmin;
      flex-shrink: 0; /* This prevents the SVG from squishing */
      margin: auto; 
    }

    .d-input-class
    {
      display:flex;
      justify-content:space-between;
      align-items: center; 
      font-size:2.5vmin; 
    }

    .range-inputs
    {
      width:70%;
    }

    .range-labels
    {
      width:15%;
      font-size: 3vmin;
    }

    .range-values
    {
      width:15%;
      text-align: right;
      font-size: 3vmin;
    }

    .palette,.palette-c1,.palette-sw 
    {
      display: flex; 
      flex-direction: row; 
      width: 87%; 
      gap: 0.5vmin; 
      flex-wrap: wrap; 
      margin-top: 1vmin;
      gap: 0.8vmin;
    }

    .palette-div-class
    {
      display:flex; 
      justify-content:space-between; 
      align-items: center; 
      font-size:3vmin;
      margin-block: 1vmin;
    }

    .palette-labels
    {
      width: 13%; 
    }

    .swatch,.swatch-c1,.swatch-sc 
    { 
      width: 3.6vmin; 
      height: 3.6vmin; 
      border-radius: 50%; 
      cursor: pointer; 
      border: 0.2vmin solid rgba(255,255,255,0.2); 
      transition: transform 0.1s ease-in; 
    }

    .swatch.active,.swatch-c1.active,.swatch-sc.active { 
      border: 0.5vmin solid orangered; 
      transform: scale(1.4); }

    .hidden { visibility: hidden; }

    .outline-div-class
    {
      display:flex; 
      flex-direction: row; 
      justify-content:space-between; 
      align-items:center; 
      margin-bottom:1vmin;
    }
    .outline-label
    {
      width: 60%;
    }

    .outline-color-input
    {

      height: 6vmin;
      width: 9vmin;
      -webkit-appearance: none;
      -moz-appearance: none;
      appearance: none;
      background-color: transparent;
      border: none;
      cursor: pointer;
    }
    .outline-color-input::-webkit-color-swatch-wrapper
    {
      padding: 0;
    }

    .outline-color-input::-webkit-color-swatch 
    {
      border: 0.2vmin solid #fff; /* Your custom border */
      border-radius: 50%;         /* Make it a circle! */
      box-shadow: 0 0 5px rgba(0,0,0,0.3);
    }

    .outline-color-input::-moz-color-swatch
    {
      border: 0.2vmin solid #fff;
      border-radius: 50%;
    }

    .outline-range
    {
      width:15vmin;
    }

    #layer-selector
    {
      display: flex;
      gap: 1vmin;
      padding: 1vmin;
      background: rgba(0,0,0,0.2);
      border-radius: 1vmin;
      margin-bottom: 1.5vmin;
      overflow-x: auto;
    }

    .layer-card {
      min-width: 8vmin;
      height: 8vmin;
      background: #444;
      border-radius: 1vmin;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-weight: bold;
      border: 0.5vmin solid transparent;
      transition: 0.2s;
      color: white;
      flex-direction: column;
      font-size: 1.8vmin;
      margin-inline: 1vmin;
    }

    .layer-card.active
    {
      border-color: orangered;
      background: var(--accent);
      scale: 1.1;
    }

    .layer-card.add-card {
      background: #222;
    }

    .console-right
    {
      width: 50vmin;
      height: 80%;
      border: 0.2vmin solid deeppink;

      display: flex;
      flex-direction: column;
      justify-content: flex-start;
    }

    .layer-selector-class
    {
      display: flex;
      flex-direction: column;
      height: 80vmin;
      width: 40vmin;
      flex-wrap: wrap;
      margin-top:1vmin;
    }
    
    select { width: 100%; padding: 0.2vmin; background: #222; color: white; border: 0.2vmin solid #444; border-radius: 0.5vmin; font-size: 3vmin; }


    @media (orientation: portrait)
    {
      body
      {
        flex-direction: column;
        overflow-y: auto;
      }

      .console-left
      {
        width: 98vmin;
        order: 2;
      }

      #mainSVG
      {
        order: 0;
        scale: 0.98;
      }

      .console-right
      {
        order:1;
        width: 98vmin;
        height: 40vmin;
      }

      .layer-selector-class
      {
        display: flex;
        flex-direction: column;
        height: 44vmin;
        width: 96vmin;
        margin-top:0vmin;
        margin: auto;
      }

      .layer-card 
      {
        max-width: 80vmin;
      }

      .layer-card.active
      {
        border-color: orangered;
        scale: 1.03;
      }

      


    }
  </style>
</head>
<body>

<div class="console-left">
  <div class="console-section">
    <div class="console-label">Quick Designer</div>

      <div style="display:flex; align-items:center; gap:0.5vmin; display: none;">
        <input type="checkbox" id="preCheck" onchange="live(true)" checked>
        <label for="preCheck" style="font-size:2.5vmin; color:#aaa; cursor:pointer;">Preview</label>
      </div>

      <select id="typeSelect" onchange="toggleRInputs(); live(true);updateTable();">
        <option value="1">T&#8321; (6)</option>
        <option value="2">T&#8322; (18)</option>
        <option value="3">T&#8323; (54)</option>
      </select>

      <div style="margin-top:1.5vmin;">
        <div id="dInput" class="d-input-class" >
          <span class="range-labels">D</span>
          <input type="range" class="range-inputs" id="dIn" min="0" max="450" value="120" oninput="live(true);updateTable();">
          <span class="range-values" id="lbl-d">120</span>
        </div>

        <div id="rInputs">
          <div class="d-input-class">
            <span class="range-labels">R<sub>1</sub></span>
            <input type="range" class="range-inputs" id="r1In" min="5" max="200" value="30" oninput="live(true);updateTable();">
            <span class="range-values" id="lbl-r1">30</span>
          </div>
          
          
          <div id="r2Area" class="d-input-class" style="display:none;">
            <span style="width:4vmin;">R<sub>2</sub></span>
            <input type="range" class="range-inputs" id="r2In" min="2" max="120" value="15" oninput="live(true);updateTable();">
            <span class="range-values" id="lbl-r2">30</span>
          </div>

          <div id="r3Area" class="d-input-class" style="display:none;">
            <span class="range-labels">R<sub>3</sub></span>
            <input type="range" class="range-inputs" id="r3In" min="2" max="60" value="5" oninput="live(true);updateTable();">
            <span class="range-values" id="lbl-r3">5</span>
          </div>
        </div>

        <div class="d-input-class">
          <span class="range-labels">Op</span>
          <input type="range" class="range-inputs" id="oIn" min="0" max="1" step="0.1" value="0.5" oninput="live(true);updateTable();">
          <span class="range-values" id="lbl-o">0.5</span>
        </div>

        <div class="d-input-class">
          <span class="range-labels">SW</span>
          <input type="range" class="range-inputs" id="swIn" min="0" max="10" value="1" oninput="live(true);updateTable();">
          <span class="range-values" id="lbl-sw">1</span>
        </div>

      </div>

      <div class="palette-div-class">
        <span class="palette-labels">In</span>
        <div class="palette" id="c1Palette"></div>
      </div>

      <div class="palette-div-class">
        <span class="palette-labels">Out</span>
        <div class="palette" id="c2Palette"></div>
      </div>

      <div class="palette-div-class">
        <span class="palette-labels">St</span>
        <div class="palette" id="scPalette"></div>
      </div>


      <button class="btn-main" onclick="addObj()" style="margin-top:2vmin;">ADD</button>
    </div>

  <div class="console-section">
    <div class="console-label">Global Style</div>

    <div class="outline-div-class">
      <label class="outline-label"><input type="checkbox" id="outCheck" onchange="toggleOutline();" checked> Outline</label>
      <input class="outline-color-input" type="color" id="outColor" class="col-input" value="#000000" oninput="render(false)" >
      <input class="outline-range" type="range" id="outWeight" min="0" max="15" value="2" oninput="render(false)">
    </div>

    <select id="bgSelect" onchange="updateBG()" style="margin-top:0.5vmin;">
      <option value="gradient">Midnight Rose</option>
      <option value="white">White</option>
      <option value="transparent">Transparent</option>
      <option value="reference">🖼</option>
    </select>

    <input type="file" id="bgUpload" style="display:none" accept="image/*" onchange="loadRefImage(this)">

  </div>


  <div class="console-section">
    <div class="console-label">Randomize & Play</div>
    <div style="display:flex; gap:1vmin; margin-top:0.5vmin;">
      <button class="btn-outline" onclick="randomize(); playAnimation(); ">🎲 Random</button>
      <button class="btn-outline" onclick="playAnimation()">▶ Play</button>
    </div>
  </div>

  <div class="console-section" >
    <div class="console-label">Export & Config </div>
    <div style="display:flex; gap:1vmin">
        <button class="btn-outline" onclick="saveSVG()">⤓ SVG</button>
        <button class="btn-outline" onclick="savePNG()">⤓ PNG</button>
    </div>

    <div style="display:flex; gap:1vmin; margin-top: 1vmin;">
        <button class="btn-outline" onclick="downloadConfig()" style="display: flex; flex-direction: row; align-items: center; justify-content: center;"> <span style=" margin-right: 0.5vmin; padding-bottom: 1vmin;">⤓</span> <span>JSON</span> </button>
        <button class="btn-outline" onclick="document.getElementById('configUpload').click()" style="display: flex; flex-direction: row; align-items: center; justify-content: center; "> <span style="margin-right: 0.5vmin; padding-bottom: 1vmin;">⤒</span> <span>JSON</span> </button>
    </div>
    <input type="file" id="configUpload" style="display:none" accept=".json" onchange="uploadConfig(this)">
  </div>


  <div class="console-section" style="border:none">
    <div class="console-label">History</div>
    <div id="historyList"></div>  
  </div>
</div>

<svg id="mainSVG" viewBox="0 0 900 900" onclick="const c = document.getElementById('preCheck'); c.checked = !c.checked; live();">
  <defs id="svgDefs">
    <mask id="holeMask" maskUnits="userSpaceOnUse" style="mask-type: alpha;">
    <rect x="-500" y="-500" width="2000" height="2000" fill="white" />
    <g id="maskHoles" transform="rotate(30, 450, 450)"></g>

  </defs>

  

  <rect id="bgRect" width="2000" height="2000" x="-500" y="-500" />
  <image id="refImage" preserveAspectRatio="xMidYMid meet" x="0" y="0" width="900"  height="900" href="" opacity="0.2" style="pointer-events: none; visibility: hidden;" />
  <g transform="rotate(30, 450, 450)" id="outlineG"></g>
  <g transform="rotate(30, 450, 450)" id="savedG"></g>
  <g transform="rotate(30, 450, 450)" id="previewG"></g>
</svg>

<div class="console-right">

  <div id="layer-selector" class="layer-selector-class">
    
  </div>

  <div id="layerPanel" class="ui-panel-alt" >
  

    <div class="drag-handle"> <span></span> <span style="font-size:4.5vmin; font-weight: light;"> ❄ ❅ ❆</span> 
      <button onclick="togglePanel();" style="float:right; padding:0 0.5vmin; width: 2vmin; margin-right: 2vmin; background:transparent; color:#eee;">_</button>
    </div>
    
    <div id="layerContent" class="panel-content" style="max-height: 85vh; overflow-y: auto;">
      
        <table>
          <thead>
            <tr>
              <th style=" font-weight: 700;"> ⇅ </th>
              <th></th>
              <th>D</th>
              <th>R<sub>1</sub></th>
              <th>R<sub>2</sub></th>
              <th>R<sub>3</sub></th>
              <th>Op</th>
              <th>StW</th>
              <th>In</th>
              <th>Out</th>
              <th>St</th>
              <th>&times;</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
    </div>
  </div>

  <button class="btn-reset-design" onclick="clearAll()">RESET DESIGN</button>  
</div>








<script>
  const colors = ["#FFFFFF", "#A2D2FF", "#BDE0FE", "#CAF0F8", "#90E0EF", "#00B4D8", "#B6D5F3", "#F7D7D4", "#D8BFD8", "#EEF6F7"];

  const c2Colors = ["#FFFFFF", "#A2D2FF", "#BDE0FE", "#CAF0F8", "#90E0EF", "#00B4D8", "#B6D5F3", "#F7D7D4", "#D8BFD8", "#EEF6F7"];

  const scColors = ["#FFFFFF", "#A2D2FF", "#BDE0FE", "#CAF0F8", "#90E0EF", "#00B4D8", "#B6D5F3", "#F7D7D4", "#D8BFD8", "#EEF6F7"];


  let selectedFill = colors[1], selectedC1=c2Colors[0],selectedSc=scColors[0] , objects = [], history = [], isAnimating = false;
  const svgNS = "http://www.w3.org/2000/svg", CX = 450, CY = 450;

  function togglePanel() {
    const content = document.getElementById("layerContent");
    const btn = event.target;
    content.classList.toggle("collapsed");
    btn.innerText = content.classList.contains("collapsed") ? "□" : "_";
  }

  function toggleOutline() {
    const isChecked = document.getElementById("outCheck").checked;
    const colorInput = document.getElementById("outColor");
    const rangeInput = document.getElementById("outWeight");

    // If NOT checked, disable the inputs. If checked, enable them.
    colorInput.disabled = !isChecked;
    rangeInput.disabled = !isChecked;

    // Add a visual hint (optional)
    colorInput.style.opacity = isChecked ? "1" : "0.3";
    rangeInput.style.opacity = isChecked ? "1" : "0.3";

    // Still run your render to update the SVG
    render(true);
  }

  function toggleRInputs() {
    const v = document.getElementById("typeSelect").value;
    document.getElementById("r2Area").style.display = v >= 2 ? "flex" : "none";
    document.getElementById("r3Area").style.display = v == 3 ? "flex" : "none";
  }

  function syncPreviewColors() {
  const defs = document.getElementById("svgDefs");
  let prevGrad = document.getElementById("preview-grad");
  
  // Create it once if it doesn't exist
  if (!prevGrad) {
    prevGrad = document.createElementNS(svgNS, "radialGradient");
    prevGrad.id = "preview-grad";
    defs.appendChild(prevGrad);
  }

  // Update the stops with current global selections
  prevGrad.innerHTML = `
    <stop offset="0%" stop-color="${selectedC1}" stop-opacity="0.7"/>
    <stop offset="100%" stop-color="${selectedFill}" stop-opacity="0.7"/>
  `;
}

  function loadRefImage(input) {
    if (input.files && input.files[0]) {
      const reader = new FileReader();
      
      reader.onload = function(e) {
        const img = document.getElementById("refImage");
        const dataUrl = e.target.result;

        // Set standard href
        img.setAttribute('href', dataUrl);
        // Set namespaced href for older browser compatibility
        img.setAttributeNS('http://www.w3.org/1999/xlink', 'xlink:href', dataUrl);
        
        img.style.visibility = "visible";
        console.log("Image loaded successfully");
      };

      reader.onerror = function() {
        console.error("Error reading the file.");
      };

      reader.readAsDataURL(input.files[0]);
    }
  }

  

    function updateBG() {
      const sel = document.getElementById("bgSelect").value;
      const rect = document.getElementById("bgRect");
      const refImg = document.getElementById("refImage");
      const defs = document.getElementById("svgDefs");

      // 1. Toggle visibility
      refImg.style.visibility = (sel === "reference") ? "visible" : "hidden";

      if (sel === "reference") {
        // 2. Robust check for the image source
        const currentSrc = refImg.getAttribute('href') || refImg.getAttributeNS('http://www.w3.org/1999/xlink', 'href');
        
        if (!currentSrc) {
          document.getElementById("bgUpload").click();
        }
        rect.setAttribute("fill", "#111"); 
        rect.setAttribute("fill-opacity", "1");
      } else if (sel === "white") { 
        rect.setAttribute("fill", "white"); 
        rect.setAttribute("fill-opacity", "1"); 
      } else if (sel === "transparent") { 
        rect.setAttribute("fill-opacity", "0"); 
      } else {
        // 3. Ensure Gradient is fully restored
        let grad = document.getElementById("bgGrad");
        if (!grad) {
          grad = document.createElementNS(svgNS, "radialGradient");
          grad.id = "bgGrad";
          defs.appendChild(grad);
        }
        // Re-apply stops in case they were lost or defs were cleared
        grad.innerHTML = `<stop offset="0%" stop-color="mistyrose"/><stop offset="100%" stop-color="midnightblue"/>`;
        rect.setAttribute("fill", "url(#bgGrad)");
        rect.setAttribute("fill-opacity", "1");
      }
  }

    function autoSelectSwatch(containerId, targetColor) {
    const container = document.getElementById(containerId);
    const swatches = container.querySelectorAll('div');
    
    swatches.forEach(swatch => {
      // We compare the background color. 
      // Note: targetColor is a Hex string, swatch.style.backgroundColor is often RGB.
      // The browser is smart enough to match them if we set them correctly.
      if (swatch.dataset.color === targetColor || swatch.style.backgroundColor === targetColor) {
         swatch.click(); 
      }
    });
  }


  function getHexPath(x, y, r) {
    let d = "";
    for (let i = 0; i < 6; i++) {
      let a = (i * Math.PI) / 3;
      d += (i === 0 ? "M " : " L ") + (x + r * Math.cos(a)).toFixed(1) + "," + (y + r * Math.sin(a)).toFixed(1);
    }
    return d + " Z";
  }

  function createHex(parent, x, y, r, obj, gradId, isPreview, isOutline, strokeCol, outW) {
  const p = document.createElementNS(svgNS, "path");
  p.setAttribute("d", getHexPath(x, y, r));
  
  if (isOutline) {
    // For the outline layer, we make it slightly larger than the hexagon
    // and fill it with the outline color. The mask handles the "hole".
    p.setAttribute("d", getHexPath(x, y, r )); 
    p.setAttribute("fill", "none");
    p.setAttribute("stroke", strokeCol);
    p.setAttribute("stroke-width", Number(outW) * 2);
    p.style.paintOrder = "fill";
  } else {
    p.setAttribute("fill", gradId ? `url(#${gradId})` : "none");
    //p.setAttribute("fill", gradId ? `url(#${gradId})` : "none");
    p.setAttribute("fill-opacity", isPreview ? 0.3 : obj.o);
    p.setAttribute("stroke", isPreview ? "red" : (obj.sc || "#fff"));
    p.setAttribute("stroke-width", isPreview ? 3 : obj.sw);
    p.setAttribute("fill-opacity", isPreview ? 0.3 : obj.o);
  }
  parent.appendChild(p);
}

  function drawGroup(parent, obj, gradId, isPreview = false, isOutline = false, strokeCol = "#000", outW = 3) {
    for (let i = 0; i < 6; i++) {
      const a = (i * Math.PI) / 3;
      const cX = CX + obj.d * Math.cos(a), cY = CY + obj.d * Math.sin(a);
      const steps = obj.type === 1 ? [0] : [-1, 0, 1];
      steps.forEach(s1 => {
        const a2 = ((i + s1) * Math.PI) / 3;
        const x2 = obj.type === 1 ? cX : cX + obj.r1 * Math.cos(a2);
        const y2 = obj.type === 1 ? cY : cY + obj.r1 * Math.sin(a2);
        if (obj.type === 3) {
          [-1, 0, 1].forEach(s2 => {
            const a3 = ((i + s1 + s2) * Math.PI) / 3;
            createHex(parent, x2 + obj.r2 * Math.cos(a3), y2 + obj.r2 * Math.sin(a3), obj.r3, obj, gradId, isPreview, isOutline, strokeCol, outW);
          });
        } else {
          createHex(parent, x2, y2, (obj.type === 2 ? obj.r2 : obj.r1), obj, gradId, isPreview, isOutline, strokeCol, outW);
        }
      });
    }
  }

  function playAnimation2() {
    if (objects.length === 0 || isAnimating) return;
    isAnimating = true;
    const duration = 2500, 
    startTime = performance.now();
    //const animQueue = [...objects].sort((a, b) => a.d - b.d);
     const animQueue = [...objects].sort((a, b) => (1000*a.type +a.d ) - (1000*b.type +b.d ));
    
    function frame(currentTime) {
      const elapsed = currentTime - startTime;
      const g = document.getElementById("savedG"), outG = document.getElementById("outlineG"), defs = document.getElementById("svgDefs");
      
      // Clear specific elements without touching background
      g.innerHTML = ""; outG.innerHTML = "";
      const existingGrads = defs.querySelectorAll('radialGradient:not(#bgGrad)');
      existingGrads.forEach(el => el.remove());

      let allFinished = true;
      objects.forEach((obj, idx) => {
        const qIdx = animQueue.indexOf(obj);
        let start = (qIdx * 200);
        let curD = 0, curR1 = 0;
        if (elapsed > start) {
          const progress = Math.min((elapsed - start) / 1000, 1);
          curD = obj.d * progress;
          curR1 = obj.r1 * (0.1 + progress * 0.9);
          if(progress < 1) allFinished = false;
        } else { allFinished = false; }

        const temp = { ...obj, d: curD, r1: curR1 };
        const gid = "ani-" + idx;
        const grad = document.createElementNS(svgNS, "radialGradient");
        grad.id = gid; 
        grad.innerHTML = `<stop offset="0%" stop-color="${obj.c1}"/><stop offset="100%" stop-color="${obj.c2}"/>`;
        defs.appendChild(grad);
        if (document.getElementById("outCheck").checked) drawGroup(outG, temp, null, false, true, document.getElementById("outColor").value, document.getElementById("outWeight").value);
        drawGroup(g, temp, gid);
      });

      // Calculate the theoretical end time of the very last layer
      const lastObj = animQueue[animQueue.length - 1];
      const lastTravel = lastObj.d * unitToMs;
      const lastGrowth = (lastObj.type === 1 ? lastObj.r1 : (lastObj.type === 2 ? lastObj.r1 + lastObj.r2 : lastObj.r1 + lastObj.r2 + lastObj.r3)) * unitToMs;
      const totalExpectedTime = (animQueue.length * (lastTravel * 0.5)) + lastTravel + lastGrowth + 500;

      if (!allFinished && elapsed < totalExpectedTime) {
        requestAnimationFrame(frame);
      } else {
        isAnimating = false;
        render(true);
      }
    }
    requestAnimationFrame(frame);
  }

  function playAnimation() {
  if (objects.length === 0 || isAnimating) return;
  isAnimating = true;

  const duration = 1500; 
  const startTime = performance.now();
  const animQueue = [...objects].sort((a, b) => a.d - b.d);



  const maxUnits = Math.max(...objects.map(o => o.d + o.r1 + (o.type === 2 ? o.r2 : 0)));
  const unitToMs = duration / (maxUnits || 1);

  function frame(currentTime) {
    const elapsed = currentTime - startTime;
    const g = document.getElementById("savedG");
    const outG = document.getElementById("outlineG");
    const defs = document.getElementById("svgDefs"); // Use ID for safety

    // FIX 1: Don't use innerHTML = "". It kills your mask and bgGrad.
    // Only remove the animation-specific gradients.
    const existingGrads = defs.querySelectorAll('radialGradient:not(#bgGrad)');
    existingGrads.forEach(el => el.remove());
    g.innerHTML = ""; 
    outG.innerHTML = "";

    let allFinished = true;

    objects.forEach((obj, originalIndex) => {
      const queueIndex = animQueue.indexOf(obj);
      const travelDuration = obj.d * unitToMs;
      const growthDuration = (obj.type === 1 ? obj.r1 : (obj.type === 2 ? obj.r1 + obj.r2 : obj.r1 + obj.r2 + obj.r3)) * unitToMs;
      
      let startOffset = 0;
      if (queueIndex > 0) {
        const prevInQueue = animQueue[queueIndex - 1];
        startOffset = (prevInQueue.d * unitToMs) * 0.5; 
      }

      const preGrowthDuration = growthDuration * 0.2; 
      const mainTravelStart = startOffset + preGrowthDuration;
      const finalGrowthStart = mainTravelStart + travelDuration;

      let curD = 0, curR1 = 0, curR2 = 0, curR3 = 0;

      if (elapsed < startOffset) {
        allFinished = false;
      } else if (elapsed < mainTravelStart) {
        const p = (elapsed - startOffset) / preGrowthDuration;
        curR1 = obj.r1 * (p * 0.1);
        curR2 = (obj.r2 || 0) * (p * 0.1);
        curR3 = (obj.r3 || 0) * (p * 0.1);
        allFinished = false;
      } else if (elapsed < finalGrowthStart) {
        const p = (elapsed - mainTravelStart) / travelDuration;
        curD = obj.d * p;
        curR1 = obj.r1 * 0.1;
        curR2 = (obj.r2 || 0) * 0.1;
        curR3 = (obj.r3 || 0) * 0.1;
        allFinished = false;
      } else if (elapsed < (finalGrowthStart + growthDuration)) {
        const p = (elapsed - finalGrowthStart) / growthDuration;
        curD = obj.d;
        curR1 = obj.r1 * (0.1 + p * 0.9);
        curR2 = (obj.r2 || 0) * (0.1 + p * 0.9);
        curR3 = (obj.r3 || 0) * (0.1 + p * 0.9);
        allFinished = false;
      } else {
        curD = obj.d; curR1 = obj.r1; curR2 = obj.r2; curR3 = obj.r3;
      }

      // FIX 2: Added curR3 to tempObj so Type 3 layers animate properly
      const tempObj = { ...obj, d: curD, r1: curR1, r2: curR2, r3: curR3 };
      const gid = "ani2-" + originalIndex;
      const grad = document.createElementNS(svgNS, "radialGradient");
      grad.setAttribute("id", gid);
      grad.innerHTML = `<stop offset="0%" stop-color="${obj.c1}"/><stop offset="100%" stop-color="${obj.c2}"/>`;
      defs.appendChild(grad);

      if (document.getElementById("outCheck").checked) {
        drawGroup(outG, tempObj, null, false, true, document.getElementById("outColor").value, document.getElementById("outWeight").value);
      }
      drawGroup(g, tempObj, gid);
    });

    if (!allFinished && elapsed < duration + 2500) {
      requestAnimationFrame(frame);
    } else {
      isAnimating = false;
      render(true);
    }
  }
  requestAnimationFrame(frame);
}

  

  function randomize() {
    objects = [];
    const count = Math.floor(Math.random() * 6) + 4;

    let t3Count = 0; // Guard for Type 3



    for (let i = 0; i < count; i++) {

      let type = 1;
      const rand = Math.random();
      
      if (rand > 0.8 && t3Count < 2) { 
        type = 3; t3Count++; 
      } else if (rand > 0.4) { 
        type = 2; 
      }

      objects.push({
        type: Math.floor(Math.random() * 3) + 1,
        d: Math.floor(Math.random() * 350), 
        r1: Math.floor( Math.random() * 60) + 30, 
        r2: Math.floor(Math.random() * 30)  + 15, 
        r3: Math.floor(Math.random() * 18) + 5,
        o: (0.7 + (0.1)*Math.floor(Math.random() * 4)).toFixed(1) ,
        sw: Math.floor(Math.random() * 3), 
        c1: "#F0F8FF", c2: colors[Math.floor(Math.random() * colors.length)], sc: "#ffffff"
      });
    }

    objects.sort((a, b) => (b.type === 2 ? b.r2 : b.r1) - (a.type === 2 ? a.r2 : a.r1));
    saveToHistory();
    render(true);

  }

  function downloadConfig() {
    if (objects.length === 0) {
      alert("Nothing to save yet!");
      return;
    }

    // We bundle the objects AND the current global outline/BG settings
    const config = {
      version: "1.0",
      timestamp: new Date().toISOString(),
      bg: document.getElementById("bgSelect").value,
      outline: {
        show: document.getElementById("outCheck").checked,
        weight: document.getElementById("outWeight").value,
        color: document.getElementById("outColor").value
      },

    };

    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(config, null, 2));
    const downloadAnchorNode = document.createElement('a');
    downloadAnchorNode.setAttribute("href", dataStr);

    document.body.appendChild(downloadAnchorNode);
    downloadAnchorNode.click();
    downloadAnchorNode.remove();

  function uploadConfig(input) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = function(e) {
      try {
        const config = JSON.parse(e.target.result);
        // Reset the counter so new layers don't clash with loaded ones
        layerCounter = Math.max(...objects.map(o => o.id), -1) + 1; 
        render(true);
        
        // 1. Restore Layers
        objects = config.layers || [];
        
        // 2. Restore Global Settings
        if (config.bg) {
          document.getElementById("bgSelect").value = config.bg;
          updateBG(); 
        }
        if (config.outline) {
          document.getElementById("outCheck").checked = config.outline.show;
          document.getElementById("outWeight").value = config.outline.weight;
          document.getElementById("outColor").value = config.outline.color;
        }

        // 3. Refresh UI and SVG
        render(true);
        saveToHistory();
        alert("Snowflake loaded successfully!");
      } catch (err) {
        alert("Error parsing config file. Make sure it's a valid Snowflake JSON.");
        console.error(err);
      }
      // Clear input so you can upload the same file again if edited
      input.value = '';
    };
    reader.readAsText(file);
  }

  function getFileName(ext) {
    const now = new Date();
    const ts = now.toISOString().replace(/[:T-]/g, '').split('.')[0];

  }

  // Palette
  const c2Pal = document.getElementById("c2Palette");
  colors.forEach(c => {
    const s = document.createElement("div");
    s.className = "swatch" + (c === selectedFill ? " active" : "");
    s.style.background = c;
    s.dataset.color = c;
    s.onclick = () => { 
      c2Pal.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
      s.classList.add('active'); selectedFill = c; live(); 
    };
    c2Pal.appendChild(s);
  });

  

  //sc Palette
  const stPal = document.getElementById("scPalette");
  colors.forEach(c => {
    const s = document.createElement("div");
    s.className = "swatch-sc" + (c === selectedSc ? " active" : "");
    s.style.background = c;
    s.dataset.color = c;
    s.onclick = () => { 
      stPal.querySelectorAll('.swatch-sc').forEach(x => x.classList.remove('active'));
      s.classList.add('active'); selectedSc = c; live(); 
    };
    stPal.appendChild(s);
  });

  objects.forEach((obj, i) => {
    if (obj.id === undefined) {
      obj.id = layerCounter++;
    }
  });

  updateBG();
  live();
  toggleOutline();
</script>

</body>
</html>
